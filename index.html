<html>
	<head>
		<link rel="stylesheet" href="style.css">
		<script type="text/javascript" src="color.js"></script>
		<script type="text/javascript" src="point.js"></script>
		<script type="text/javascript" src="vector.js"></script>
		<script type="text/javascript" src="matrix4.js"></script>
		<script type="text/javascript" src="triangle.js"></script>
		<script type="text/javascript" src="camera.js"></script>
		<script type="text/javascript" src="lightsource.js"></script>
		<script type="text/javascript" src="image.js"></script>
		<script type="text/javascript" src="cube.js"></script>
		<script type="text/javascript" src="config.js"></script>
		<script type="text/javascript" src="scene.js"></script>
		<script type="text/javascript" src="webgl-renderer.js"></script>
		<script type="text/javascript" src="parallel.js"></script>
		<script type="text/javascript" src="engine.js"></script>
		<script type="text/javascript" src="stl-loader.js"></script>
	</head>
	<body>
		<div class="app">
			<div style="font-size:24px; font-weight:bold; margin-bottom:18px">Rayon &mdash; <span id="mode-label">CPU Ray Tracer in JavaScript</span></div>
			<div class="canvas-container" id="canvas-container">
				<canvas id="canvas"></canvas>
				<canvas id="canvas-gpu" style="display:none"></canvas>
			</div>
        

			<div id="controls" class="controls">
			<p>
				<label>Diffuse: <span id="diffVal">0.5</span></label>
				<input id="diffRange" type="range">
			</p>
			<p>
				<label>Specular: <span id="specVal">0</span></label>
				<input id="specRange" type="range">
			</p>
			<p>
				<label>Shininess: <span id="shinVal">32</span></label>
				<input id="shinRange" type="range">
			</p>
			<p>
				<label>Ambient: <span id="ambVal">0.2</span></label>
				<input id="ambRange" type="range">
			</p>
			</div>
			<div class="fps-box">FPS: <span id="fps">--</span></div>

			<div style="margin-top:18px">
			<button id="btn-trace">Trace All</button>
			<button id="btn-start-anim">Start Animation</button>
			<button id="btn-stop-anim">Stop Animation</button>
			<button id="switch-btn">Switch to GPU (WebGL2)</button>
			</div>

			<div style="margin-top:18px; display:flex; align-items:center; gap:12px; flex-wrap:wrap">
				<strong>Load STL:</strong>
				<input type="file" id="stl-file" accept=".stl">
				<label>Color <input type="color" id="stl-color" value="#cc8833"></label>
				<label>Scale <input type="number" id="stl-scale" value="1" min="0.0001" step="0.1" style="width:70px"></label>
				<button id="btn-load-stl">Load</button>
				<span id="stl-status" style="color:#888"></span>
			</div>

			<script type="text/javascript" src="ui.js"></script>
			<script type="text/javascript" src="script.js"></script>
		</div>
	</body>
</html>
